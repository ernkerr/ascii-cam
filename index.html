<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ascii-cam — live ASCII art from your webcam or photos</title>

    <!-- Canonical URL so Google doesn't treat www/non-www as duplicates. -->
    <link rel="canonical" href="https://ascii-cam.com/" />

    <!-- Core SEO -->
    <meta
      name="description"
      content="Free online ASCII art generator. Turn your webcam or any photo into live ASCII art — pick colors, character sets, tweak contrast, export as PNG, MP4 or GIF. No signups, no ads."
    />
    <meta
      name="keywords"
      content="ascii art, ascii cam, ascii webcam, ascii art generator, webcam to ascii, ascii video, text art, ascii converter, ascii online"
    />
    <meta name="author" content="ern" />
    <meta name="theme-color" content="#0a0a0a" />

    <!-- JSON-LD structured data: tells Google this is a WebApplication.
         Helps rich snippets + "applicationCategory" categorization. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "ascii-cam",
        "url": "https://ascii-cam.com",
        "description": "Live ASCII art from your webcam or photos. Pick colors and character sets, export PNG / MP4 / GIF. Free, in-browser, no signups.",
        "applicationCategory": "MultimediaApplication",
        "operatingSystem": "Any (web)",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
        "creator": { "@type": "Person", "name": "ern" }
      }
    </script>

    <!-- Open Graph (Facebook, iMessage, Slack, LinkedIn, Discord) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ascii-cam.com" />
    <meta property="og:title" content="ascii-cam — turn your camera into ASCII art" />
    <meta
      property="og:description"
      content="Live ASCII art from your webcam or photos. Free, no signups, no ads. Export PNG / MP4 / GIF."
    />
    <meta property="og:image" content="https://ascii-cam.com/favicon.png" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ascii-cam" />
    <meta
      name="twitter:description"
      content="Live ASCII art from your webcam or photos."
    />
    <meta name="twitter:image" content="https://ascii-cam.com/favicon.png" />

    <!-- Google Analytics 4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-L3WH3B2S68"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-L3WH3B2S68');
    </script>

    <!-- Cloudflare Web Analytics -->
    <script defer src="https://static.cloudflareinsights.com/beacon.min.js" data-cf-beacon='{"token": "5dd883fc4e244ed9a49f5db2d5f5a7a1"}'></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
