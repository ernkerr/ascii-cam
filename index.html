<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ascii-cam — turn your camera into ASCII art</title>

    <!-- Core SEO -->
    <meta
      name="description"
      content="Turn your webcam or any image into live ASCII art. Pick colors and character sets, tweak contrast, export PNG / MP4 / GIF. Free, no signups, no ads."
    />
    <meta name="theme-color" content="#0a0a0a" />

    <!-- Open Graph (Facebook, iMessage, Slack, LinkedIn, Discord) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ascii-cam.com" />
    <meta property="og:title" content="ascii-cam — turn your camera into ASCII art" />
    <meta
      property="og:description"
      content="Live ASCII art from your webcam or photos. Free, no signups, no ads. Export PNG / MP4 / GIF."
    />
    <meta property="og:image" content="https://ascii-cam.com/favicon.png" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ascii-cam" />
    <meta
      name="twitter:description"
      content="Live ASCII art from your webcam or photos."
    />
    <meta name="twitter:image" content="https://ascii-cam.com/favicon.png" />

    <!-- ============================================================
         Analytics.
         Replace the placeholder IDs with the real ones and redeploy.
         Both scripts are safe to leave as placeholders (no-op until
         you swap them in).
         ============================================================ -->

    <!-- Google Analytics 4
         Get Measurement ID at analytics.google.com → Admin → Data Streams.
         Replace G-L3WH3B2S68 (appears twice) with your real ID. -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-L3WH3B2S68"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-L3WH3B2S68');
    </script>

    <!-- Cloudflare Web Analytics
         Get token at dash.cloudflare.com → Analytics & Logs → Web Analytics
         → Add a site → grab the `token` value in the snippet.
         Replace CF_BEACON_TOKEN with your real token. -->
    <script defer src="https://static.cloudflareinsights.com/beacon.min.js" data-cf-beacon='{"token": "CF_BEACON_TOKEN"}'></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
